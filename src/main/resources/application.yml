spring:
  application:
    name: automation-bot-whatsapp-omie
  config:
    import: optional:file:./application-local.yml

  datasource:
    # Prioriza URL JDBC explícita; DATABASE_URL fica como fallback.
    # Em alguns hosts, DATABASE_URL vem como postgres://..., que não é formato JDBC.
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD}}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.whatsappomie: INFO

app:
  scheduler:
    reenvio-ms: 3600000
    expiracao-ms: 600000

  bot:
    disparo-api-key: ${BOT_DISPARO_API_KEY:}

  whatsapp:
    provider: ${WHATSAPP_PROVIDER:mock}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_WHATSAPP_FROM:}

  omie:
    enabled: false
    app-key: ${OMIE_APP_KEY:}
    app-secret: ${OMIE_APP_SECRET:}
    base-url: https://app.omie.com.br/api/v1
    pedido-compra-path: /produtos/pedidocompra/
    pedido-compra:
      fornecedor-codigo: ${OMIE_N_COD_FOR:}
      conta-corrente-codigo: ${OMIE_N_COD_CC:}
