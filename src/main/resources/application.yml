spring:
  application:
    name: automation-bot-whatsapp-omie
  config:
    import: optional:file:./application-local.yml

  datasource:
    # Produção: use JDBC (jdbc:postgresql://...). Aceita DATABASE_* (Render Postgres) ou SPRING_DATASOURCE_*.
    # Não use URL vazia: senão o placeholder "vence" e o Hibernate perde metadados/dialeto.
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://db.rzvdnjmwffvlqxkbhres.supabase.co:6543/postgres?sslmode=require&prepareThreshold=0}}
    username: ${DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:postgres}}
    password: ${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}

  jpa:
    # Evita "Unable to determine Dialect without JDBC metadata" quando metadados JDBC não estão disponíveis no bootstrap.
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        # Garante o dialeto no persistence unit (alguns setups só leem isto, não spring.jpa.database-platform).
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.whatsappomie: INFO

app:
  scheduler:
    reenvio-ms: 3600000
    expiracao-ms: 600000

  bot:
    disparo-api-key: ${BOT_DISPARO_API_KEY:}

  whatsapp:
    provider: ${WHATSAPP_PROVIDER:mock}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_WHATSAPP_FROM:}

  omie:
    enabled: false
    app-key: ${OMIE_APP_KEY:}
    app-secret: ${OMIE_APP_SECRET:}
    base-url: https://app.omie.com.br/api/v1
    pedido-compra-path: /produtos/pedidocompra/
    pedido-compra:
      fornecedor-codigo: ${OMIE_N_COD_FOR:}
      conta-corrente-codigo: ${OMIE_N_COD_CC:}
